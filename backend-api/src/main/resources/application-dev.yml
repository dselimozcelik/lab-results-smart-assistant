server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/labresults
    username: labresults
    password: labresults
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
