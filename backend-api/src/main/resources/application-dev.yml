server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/labresults
    username: labresults
    password: labresults
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

lab:
  jwt:
    # Dev-only secret (>= 256 bits for HS256). In production this comes from a secret manager.
    secret: dev-secret-change-me-please-32bytes-minimum-0123456789
    expiry-minutes: 60
  anomaly:
    # How far beyond a reference bound (as a fraction of the range width) is CRITICAL.
    # Documented heuristic, not a clinical panic value (see CLAUDE.md business rules).
    critical-factor: 0.5
  polling:
    mock-base-url: http://localhost:8081
    fixed-delay-ms: 10000
    timeout: 5s
    # Leave blank for normal operation: the mock streams a varied, realistic random batch.
    # To force a case for a demo, set one of:
    #   normal | abnormal | critical | duplicate | missing-field | invalid-unit | stale | device-error
    # (e.g. run with --lab.polling.scenario=invalid-unit)
    scenario:
  ollama:
    # Local LLM runs on the host (privacy: patient data never leaves the machine).
    base-url: http://localhost:11434
    # Instruct model. gemma2:9b gives the cleanest Turkish and the most reliable status labelling
    # of the local options that fit a 16GB M1. Swap for any local model without touching code.
    model: gemma2:9b
    # Cap the wait so a slow/hung LLM never blocks the request indefinitely.
    # A 7B model is slower per call, so allow a little more headroom.
    timeout: 60s
