services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: labresults
      POSTGRES_USER: labresults
      POSTGRES_PASSWORD: labresults
    volumes:
      - labresults-full-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labresults"]
      interval: 5s
      timeout: 5s
      retries: 10

  mock-lab-service:
    build: ./mock-lab-service
    ports:
      - "${MOCK_LAB_PORT:-8081}:8081"

  backend-api:
    build: ./backend-api
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set to a private value of at least 32 characters}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma2:9b}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      POLLING_DELAY_MS: ${POLLING_DELAY_MS:-30000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      mock-lab-service:
        condition: service_started
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    depends_on:
      backend-api:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  labresults-full-pgdata:
